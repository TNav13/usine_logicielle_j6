name: CI Pipeline

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - name: Installer Python
            uses: actions/setup-python@v5
            with:
              python-version: "3.12"
          - name: Cache pip
            uses: actions/cache@v4
            with:
              path: ~/.cache/pip
              key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
              restore-keys: |
                ${{ runner.os }}-pip-
          - name: Installer les dépendances
            run: pip install -r requirements.txt

          - name: Formatage (black)
            run: black --check src/ tests/

          - name: Linting avec Ruff
            run: ruff check src/ tests/

          - name: Analyse sécurité Bandit
            run: bandit -r src/ -ll

          - name: Analyse sécurité Semgrep
            run: semgrep --config auto --error src/

          - name: Lancer les tests avec couverture
            run: |
              pytest --cov=src \
              --cov-report=term \
              --cov-report=html:coverage-report \
              --cov-fail-under=70 \
              -v

          - name: Sauvegarder le rapport
            uses: actions/upload-artifact@v4
            if: always()
            with:
              name: coverage-report
              path: coverage-report/

          - name: Générer rapport couverture XML
            run: pytest --cov=src --cov-report=xml -v

          - name: SonarCloud Scan
            uses: SonarSource/sonarcloud-github-action@d899ed299620f557b0175710b8dedbdd7c31213d
            env:
              GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
