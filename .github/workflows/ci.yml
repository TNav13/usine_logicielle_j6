name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-and-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detection de secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Installer les dependances
        run: pip install -r requirements.txt

      - name: Formatage (black)
        run: black --check src/ tests/

      - name: Linting (ruff)
        run: ruff check src/ tests/

      - name: Scan dependances (pip-audit)
        run: pip-audit -r requirements.txt

      - name: Securite code (bandit)
        run: bandit -r src/ -ll

      - name: Securite code (semgrep)
        run: semgrep --config auto --config .semgrep/custom-rules.yml --error src/

      - name: Tests + couverture
        run: |
          pytest --cov=src \
          --cov-report=term \
          --cov-report=html:coverage-report \
          --cov-fail-under=70 -v

      - name: Sauvegarder le rapport
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage-report/

      - name: SonarCloud Scan
        if: success()
        uses: SonarSource/sonarqube-scan-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  deploy:
    needs: security-and-quality
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Connexion a ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build et tag de l'image
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE=ghcr.io/$REPO_LOWER
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          docker build \
            -t $IMAGE:${{ github.sha }} \
            -t $IMAGE:sha-$SHORT_SHA \
            -t $IMAGE:latest \
            .

      - name: Tester le conteneur
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE=ghcr.io/$REPO_LOWER
          docker run -d -p 5000:5000 --name test-container $IMAGE:${{ github.sha }}
          sleep 5
          curl -f http://localhost:5000/health
          docker stop test-container

      - name: Push de l'image (tous les tags)
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE=ghcr.io/$REPO_LOWER
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:sha-$SHORT_SHA
          docker push $IMAGE:latest
